name: Diagram Freshness

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  diagram-freshness:
    uses: selamy-labs/.github/.github/workflows/diagram-freshness.yml@main
    with:
      source-globs: |
        src/**
        pyproject.toml
      diagram-globs: |
        docs/architecture/**
      enforce: false
      escape-label: no-diagram-impact

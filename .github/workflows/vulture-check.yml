name: Vulture Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  vulture-check:
    uses: selamy-labs/.github/.github/workflows/vulture-check.yml@main
    with:
      paths: src tests
